<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Koditos Arcade</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #101014;
        color: #f8f8f2;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(36px, 8vw, 72px);
      }

      p {
        margin: 0 0 28px;
        color: #c8c8d4;
      }

      .games {
        display: grid;
        gap: 16px;
      }

      a {
        display: block;
        padding: 20px;
        border: 2px solid #2f9cff;
        border-radius: 8px;
        color: #f8f8f2;
        text-decoration: none;
        background: #171722;
      }

      a:hover {
        border-color: #ffd447;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Koditos Arcade</h1>
      <p>Juegos pequenos, directos y listos para crecer.</p>

      <section class="games" aria-label="Lista de juegos">
        <a href="games/RoboChip/index.html">RoboChip</a>
      </section>
    </main>
  </body>
</html>
