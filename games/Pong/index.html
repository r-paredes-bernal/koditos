<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Padel Arcade | IXMAIA Arcade</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="hud">
        <a class="back-link" href="../../index.html">Menu</a>
        <h1>Padel Arcade</h1>
        <div class="scoreboard" aria-label="Marcador">
          <span id="left-score">0</span>
          <span aria-hidden="true">:</span>
          <span id="right-score">0</span>
        </div>
      </header>

      <section class="controls" aria-label="Controles del juego">
        <button id="pause-button" type="button">Pausar</button>
        <button id="reset-button" type="button">Reiniciar</button>
        <button class="touch-power-button" id="power-hit-button" type="button">Golpe fuerte</button>
      </section>

      <section class="play-area" aria-label="Area de juego">
        <div class="court-column">
          <canvas id="game" width="800" height="460" aria-label="Juego Padel Arcade"></canvas>
        </div>

        <aside class="level-panel" aria-labelledby="level-title">
          <h2 id="level-title">Nivel</h2>
          <div class="difficulty-controls" aria-label="Dificultad contra la maquina">
            <button class="difficulty-button difficulty-button--active" type="button" data-difficulty="easy" aria-pressed="true">Facil</button>
            <button class="difficulty-button" type="button" data-difficulty="medium" aria-pressed="false">Medio</button>
            <button class="difficulty-button" type="button" data-difficulty="advanced" aria-pressed="false">Avanzado</button>
          </div>

          <div class="side-panel-section" aria-labelledby="mode-title">
            <h2 id="mode-title">Modo de juego</h2>
            <div class="mode-controls" aria-label="Modo de juego">
              <button class="mode-button mode-button--active" type="button" data-mode="single" aria-pressed="true">1 jugador</button>
              <button class="mode-button" type="button" data-mode="two" aria-pressed="false">2 jugadores</button>
            </div>
          </div>
        </aside>
      </section>

      <section class="instructions" aria-labelledby="instructions-title">
        <h2 id="instructions-title">Controles</h2>
        <p id="instructions">1 jugador: flechas para mover, Shift para pegar con fuerza. La maquina controla la pala izquierda.</p>
      </section>
      <p class="status" id="status">Espacio para pausar.</p>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
