<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoboChip | IXMAIA Arcade</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="play-area" aria-label="Area de juego">
        <div class="board-column">
          <header class="hud">
            <a class="back-link" href="../../index.html">Menu</a>
            <h1>Robo Chip</h1>
            <div class="stats">
              <p>Puntos: <span id="score">0</span></p>
              <p>Vidas: <span id="lives">3</span></p>
            </div>
          </header>

          <div class="controls">
            <button id="pause-button" type="button">Pausar</button>
          </div>

          <canvas id="game" width="448" height="480" aria-label="Juego RoboChip"></canvas>
          <p class="status" id="status">Flechas o controles tactiles para moverte. Espacio para pausar.</p>

          <div class="touch-pad" aria-label="Controles tactiles">
            <button class="touch-control touch-control--up" type="button" data-direction="ArrowUp" aria-label="Mover arriba">▲</button>
            <button class="touch-control touch-control--left" type="button" data-direction="ArrowLeft" aria-label="Mover izquierda">◀</button>
            <button class="touch-control touch-control--right" type="button" data-direction="ArrowRight" aria-label="Mover derecha">▶</button>
            <button class="touch-control touch-control--down" type="button" data-direction="ArrowDown" aria-label="Mover abajo">▼</button>
          </div>
        </div>

      </section>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
